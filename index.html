<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Simon Ockas — Graphic Designer based in Prague. Portfolio of print, editorial, and brand design work.">
  <title>Šimon Očkáš — Graphic Designer</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    /* 1. Define color variables */
    :root {
      --bg-color: #ffffff;
      --text-color: #111111;
    }
  
    /* 2. Fonts */
    @font-face {
      font-family: 'Monument Extended';
      src: url('/MonumentExtended-Ultrabold.woff2') format('woff2');
      font-weight: 700;
    }
    @font-face {
      font-family: 'Nohemi';
      src: url('/nohemi-medium.woff') format('woff');
      font-weight: 500;
    }
    @font-face {
      font-family: 'Nohemi';
      src: url('/Nohemi-SemiBold.woff2') format('woff2');
      font-weight: 600;
    }
  
    /* 3. Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
  
    /* 4. Body */
    body {
      background: var(--bg-color);
      color: var(--text-color);
      width: 100%;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      
      cursor: url('/hand-cursor-default.png') 13 4, auto;
      }
      a,
      button,
      .lang-btn,
      .links * {
        cursor: url('/hand-cursor-pointer.png') 13 4, pointer;
      }
    }
  
    /* 5. Corner labels */
    .corner {
      position: fixed;
      font-family: 'Nohemi', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--text-color);
    }
    .corner-tl { top: 10px; left: 10px; }
    .corner-tr { top: 10px; right: 10px; }
    .corner-bl { bottom: 10px; left: 10px; }
    .corner-br { bottom: 10px; right: 10px; }
  
    /* 6. Center block */
    .center {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 33px;
      width: 100%;
      padding: 0 20px;
    }
  
    .subtitle {
      font-family: 'Nohemi', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 500;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      color: var(--text-color);
    }
  
    h1 {
      font-family: 'Monument Extended', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: clamp(3.5rem, 10vw, 7.5rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-align: center;
      color: var(--text-color);
    }
  
    h1 span { display: inline; }
    h1 .space { display: inline; }
  
    /* 7. Language buttons */
    .links {
      display: flex;
      justify-content: center;  /* Keep horizontal centering */
      align-items: center;
      gap: 2.5rem;
      width: 100%;  /* Ensure flex works */
    }
  
    .lang-btn {
      font-family: 'Monument Extended', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 2.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      color: var(--text-color);
      border: 2px solid var(--text-color);
      border-radius: 9999px;
      padding: 0.55rem 1.1rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
  
    .lang-btn:hover { opacity: 0.4; }
    .lang-btn.active {
      background: var(--text-color);
      color: var(--bg-color);
    }
  
    /* 8. Mobile */
    @media (max-width: 600px) {
      h1 { font-size: 4.2rem; line-height: 1; }
      h1 span { display: block; }
      h1 .space { display: none; }
      .subtitle { font-size: 1rem; }
      .lang-btn { font-size: 1.4rem; }
      .center { gap: 16px; }
    }
  
    /* 9. Optional dark mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #111111;
        --text-color: #eeeeee;
      }
    }
  </style>
</head>
<body>

  <span class="corner corner-tl">Portfolio</span>
  <svg class="corner corner-tr" width="14" height="14" viewBox="0 0 187.69 187.69" xmlns="http://www.w3.org/2000/svg">
    <path d="M187.69,107.25h-80.44v80.44h-26.81v-80.44H0v-26.81h80.44V0h26.81v80.44h80.44v26.81Z" fill="var(--text-color)"/>
  </svg>
  <svg class="corner corner-bl" width="14" height="14" viewBox="0 0 187.69 187.69" xmlns="http://www.w3.org/2000/svg">
    <path d="M187.69,107.25h-80.44v80.44h-26.81v-80.44H0v-26.81h80.44V0h26.81v80.44h80.44v26.81Z" fill="var(--text-color)"/>
  </svg>
  <span class="corner corner-br">2026</span>

  <div class="center">
    <p class="subtitle">Graphic Designer</p>
    <h1><span>Simon</span><span class="space">&nbsp;</span><span>Ockas</span></h1>
    <div class="links">
      <a href="/portfolio_sk.pdf" class="lang-btn" id="btn-sk">CZ / SK</a>
      <a href="/portfolio_en.pdf" class="lang-btn" id="btn-en">EN</a>
    </div>
  </div>

  <script>
    const buttons = document.querySelectorAll('.lang-btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>

</body>
</html>
