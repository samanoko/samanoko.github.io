<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Šimon Očkáš — Graphic Designer</title>
  <style>
    @font-face {
      font-family: 'Monument Extended';
      src: url('/monument-extended-bold.woff2') format('woff2');
      font-weight: 700;
    }
    @font-face {
      font-family: 'Nohemi';
      src: url('/nohemi-medium.woff') format('woff');
      font-weight: 500;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Monument Extended', 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      align-items: center;
      justify-items: center;
    }
    .hero {
      grid-row: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }
    .links {
      grid-row: 3;
      align-self: center;
      display: flex;
      gap: 2rem;
    }
    h1 {
      font-family: 'Monument Extended', 'Helvetica Neue', Arial, sans-serif;
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
    }
    h2 {
      font-family: 'Nohemi', 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
    }
    a {
      font-family: 'Monument Extended', 'Helvetica Neue', Arial, sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
      border: 1.5px solid #111;
      border-radius: 9999px;
      padding: 0.5rem 1.5rem;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.4; }

    /* Mobile: split Simon / Ockas onto two lines */
    @media (max-width: 600px) {
      h1 {
        font-size: 3rem;
      }
      h1::before {
        content: 'Simon\AОckas';
        white-space: pre;
      }
      h1 > * { display: none; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Simon Ockas</h1>
    <h2>Graphic Designer</h2>
  </div>
  <div class="links">
    <a href="/portfolio_sk.pdf">CZ / SK</a>
    <a href="/portfolio_en.pdf">EN</a>
  </div>
</body>
</html>
