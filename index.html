<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Simon Ockas — Graphic Designer based in Prague. Portfolio of print, editorial, and brand design work.">
  <title>Šimon Očkáš — Graphic Designer</title>
  <link rel="icon" type="image/jpeg" href="/favicon-blue.jpg">
  <style>
    @font-face {
      font-family: 'Monument Extended';
      src: url('/MonumentExtended-Ultrabold.woff2') format('woff2');
      font-weight: 700;
    }
    @font-face {
      font-family: 'Nohemi';
      src: url('/nohemi-medium.woff') format('woff');
      font-weight: 500;
    }
    @font-face {
      font-family: 'Nohemi';
      src: url('/Nohemi-SemiBold.woff2') format('woff2');
      font-weight: 600;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      color: #111;
      width: 100%;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Corner labels */
    .corner {
      position: fixed;
      font-family: 'Nohemi', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1;
      color: #111;
    }
    .corner-tl { top: 10px; left: 10px; }
    .corner-tr { top: 10px; right: 10px; }
    .corner-bl { bottom: 10px; left: 10px; }
    .corner-br { bottom: 10px; right: 10px; }

    /* Center block */
    .center {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 33px;
      width: 100%;
      padding: 0 20px;
    }

    .subtitle {
      font-family: 'Nohemi', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 500;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      color: #111;
    }

    h1 {
      font-family: 'Monument Extended', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: clamp(3.5rem, 10vw, 7.5rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-align: center;
      color: #111;
    }

    h1 span { display: inline; }
    h1 .space { display: inline; }

    /* Language buttons */
    .links {
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }

    .lang-btn {
      font-family: 'Monument Extended', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 2.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      color: #111;
      text-decoration: none;
      border: 2px solid #111;
      border-radius: 9999px;
      padding: 0.55rem 1.1rem;
      transition: opacity 0.2s;
      white-space: nowrap;
      cursor: pointer;
    }

    .lang-btn:hover { opacity: 0.4; }
    .lang-btn.active {
      background: #111;
      color: #fff;
    }

    /* Mobile */
    @media (max-width: 600px) {
      h1 { font-size: 4.2rem; line-height: 1; }
      h1 span { display: block; }
      h1 .space { display: none; }
      .subtitle { font-size: 1rem; }
      .lang-btn { font-size: 1.4rem; }
      .center { gap: 16px; }
    }
  </style>
</head>
<body>

  <span class="corner corner-tl">Portfolio</span>
  <img src="/plus_sign_vector.svg" class="corner corner-tr" style="width:14px; height:14px;">
  <img src="/plus_sign_vector.svg" class="corner corner-bl" style="width:14px; height:14px;">
  <span class="corner corner-br">2026</span>

  <div class="center">
    <p class="subtitle">Graphic Designer</p>
    <h1><span>Simon</span><span class="space">&nbsp;</span><span>Ockas</span></h1>
    <div class="links">
      <a href="/portfolio_sk.pdf" class="lang-btn" id="btn-sk">CZ / SK</a>
      <a href="/portfolio_en.pdf" class="lang-btn" id="btn-en">EN</a>
    </div>
  </div>

  <script>
    const buttons = document.querySelectorAll('.lang-btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>

</body>
</html>
