<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Šimon Očkáš — Graphic Designer</title>
  <style>
    @font-face {
      font-family: 'Monument Extended';
      src: url('/monument-extended-bold.woff2') format('woff2');
      font-weight: 700;
    }

    @font-face {
      font-family: 'Nohemi';
      src: url('/nohemi-medium.woff') format('woff');
      font-weight: 500;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Monument Extended', 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-family: 'Monument Extended', 'Helvetica Neue', Arial, sans-serif;
      font-size: 9rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 0;
    }

    h2 {
      font-family: 'Nohemi', 'Helvetica Neue', Arial, sans-serif;
      font-size: 3.375rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0;
      margin-bottom: 6.75rem;
    }

    .links {
      display: flex;
      gap: 2rem;
    }

    a {
      font-size: 3.375rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
      border: 1.5px solid #111;
      border-radius: 9999px;
      padding: 0.5rem 1.5rem;
      transition: opacity 0.2s;
    }

    a:hover { opacity: 0.4; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simon Ockas</h1>
    <h2>Graphic Designer</h2>
    <div class="links">
      <a href="/portfolio_sk.pdf">CZ / SK</a>
      <a href="/portfolio_en.pdf">EN</a>
    </div>
  </div>
</body>
</html>
